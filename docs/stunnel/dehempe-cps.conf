# stunnel — tunnel mTLS local pour Déhempé sur macOS dev (via OpenSSL provider pkcs11)
#
# Lancement (dev) :
#   OPENSSL_CONF=docs/stunnel/openssl.cnf \
#   stunnel docs/stunnel/dehempe-cps.conf
#
# Logs : /tmp/dehempe-stunnel.log
# PID  : /tmp/dehempe-stunnel.pid

foreground = no
output     = /tmp/dehempe-stunnel.log
pid        = /tmp/dehempe-stunnel.pid
debug      = 7

# ─── Service : tunnel mTLS vers le DMP ─────────────────────────────────────
[dmp]
client     = yes
accept     = 127.0.0.1:5443
connect    = lps.dev1.dmp.gouv.fr:443
sni        = lps.dev1.dmp.gouv.fr
sslVersion = TLSv1.2

# Cert et clé via URI PKCS#11 (RFC 7512), résolues par le provider pkcs11
# chargé depuis OPENSSL_CONF=docs/stunnel/openssl.cnf.
cert = pkcs11:id=%E8%28%BD%08%0F%80%25%00%00%01%FF%00%10%20;type=cert
key  = pkcs11:id=%E8%28%BD%08%0F%80%25%00%00%01%FF%00%10%20;type=private

# Vérification du cert serveur DMP : à activer en prod avec le CA ANS.
verifyChain = no
